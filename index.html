<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#080b10" />
  <title>S.C.S. AI — Simple Circle Showdown</title>
  <link rel="stylesheet" href="style.css?v=0628o" />
</head>
<body>
  <div class="app">
    <header class="app-head">
      <h1>S.C.S.<span class="ai">AI</span><span class="ver">build 0628o</span></h1>
      <div class="sub">SIMPLE CIRCLE SHOWDOWN · 人格を設計して観戦するオートバトラー</div>
    </header>

    <nav class="mode-bar" id="modeBar">
      <button id="tabFree" class="mtab active">自由対戦</button>
      <button id="tabStory" class="mtab">ストーリー</button>
    </nav>

    <section id="storyHome" class="story hidden"></section>
    <section id="storyScout" class="story hidden"></section>

    <section class="stage" id="stage">
      <div class="stage-top">
        <span class="chips-left"><span class="arena-chip" id="arenaChip">—</span><span class="mod-chip" id="modChip"></span></span>
        <span class="turn-chip" id="turnInfo">TURN 0</span>
      </div>

      <!-- 2D上空ミニマップ（CRTレーダー調） -->
      <div class="track-wrap">
        <canvas id="mini" class="mini"></canvas>
        <div class="track-foot">
          <span class="lg p">● YOU</span>
          <span class="dist" id="distNum">距離 —</span>
          <span class="lg c">CPU ●</span>
        </div>
      </div>

      <!-- ユニットカード -->
      <div class="cards">
        <div class="ucard plr" id="cardP">
          <div class="uc-top"><span class="uc-name" id="nameP">YOU</span><span class="uc-weap" id="weapP"></span></div>
          <div class="hp-row"><div class="hpbar"><i id="hpfP"></i></div><span class="hp-num" id="hpnP">—</span></div>
          <div class="sta-row"><span class="sta-lbl">気力</span><div class="stabar"><i id="staP"></i></div></div>
          <div class="sta-row res-row" id="resRowP"><span class="sta-lbl">気迫</span><div class="stabar resbar"><i id="resP"></i></div></div>
          <div class="chips" id="chipsP"></div>
        </div>
        <div class="ucard cpu" id="cardC">
          <div class="uc-top"><span class="uc-name" id="nameC">CPU</span><span class="uc-weap" id="weapC"></span></div>
          <div class="hp-row"><div class="hpbar"><i id="hpfC"></i></div><span class="hp-num" id="hpnC">—</span></div>
          <div class="sta-row"><span class="sta-lbl">気力</span><div class="stabar"><i id="staC"></i></div></div>
          <div class="sta-row res-row" id="resRowC"><span class="sta-lbl">気迫</span><div class="stabar resbar"><i id="resC"></i></div></div>
          <div class="chips" id="chipsC"></div>
        </div>
      </div>

      <!-- 流れ（モメンタム） -->
      <div class="mo-wrap">
        <span class="mo-end p">YOU</span>
        <div class="mo"><span class="mo-c"></span><i id="moFill"></i></div>
        <span class="mo-end c">CPU</span>
        <span class="mo-lbl">流れ</span>
      </div>

      <!-- 戦闘ログ -->
      <div class="logwrap"><div id="log" class="log"></div></div>

      <div class="controls">
        <button id="btnNext" class="btn">▶ 次の手</button>
        <button id="btnAuto" class="btn primary">▶ 自動実行</button>
        <button id="btnParams" class="btn ghost">戦闘分析</button>
      </div>
    </section>

    <section id="storyResult" class="story hidden"></section>

    <section class="config" id="config">
      <h3>人格設計<span class="h3-sub">10軸 × 各4択で、あなたのAIを作る</span></h3>
      <div id="plrParams" class="macros"></div>
      <div class="cfg-foot" id="freeFoot">
        <label class="fld">戦場<select id="arenaSel"></select></label>
        <label class="fld">戦況<select id="modSel"></select></label>
        <label class="fld">CPU<select id="cpuPreset"></select></label>
        <label class="fld">seed<input id="seed" type="number" value="12345" /></label>
        <label class="chk"><input type="checkbox" id="randSeed" checked /> 毎回ランダム</label>
        <button id="btnNew" class="btn primary big">新規対戦</button>
        <span id="cfgLock" class="cfg-lock"></span>
      </div>
      <div class="cfg-foot story-foot hidden" id="storyFoot"></div>
      <p class="hint" id="freeHint">人格を選び「新規対戦」→「次の手」で1ターンずつ、または「自動実行」で連続観戦。「毎回ランダム」ONで毎回違う戦闘、OFF＋seed固定で同じ戦闘を再現できます。</p>
    </section>

    <section id="paramsWrap" class="params-wrap hidden">
      <h3>戦闘分析<span class="h3-sub">観戦して「どこをどう直すか」を読む</span></h3>
      <div id="params" class="params"></div>
    </section>
  </div>

  <script src="js/rng.js?v=0628o"></script>
  <script src="js/data.js?v=0628o"></script>
  <script src="js/derive.js?v=0628o"></script>
  <script src="js/sim.js?v=0628o"></script>
  <script src="js/ui.js?v=0628o"></script>
  <script src="js/mini.js?v=0628o"></script>
  <script src="js/story.js?v=0628o"></script>
</body>
</html>
